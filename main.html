<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Main Page</title>

    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Style -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <header>
      <nav>
        <div class="navbar bg-base-100 shadow-sm md:px-20">
          <div class="flex flex-col md:flex-row items-center flex-1 gap-1">
            <img class="w-9" src="./assets/github-logo.png" alt="" />
            <h2 class="text-xs md:text-2xl font-semibold text-[#1F2937]">
              GitHub Issues Tracker
            </h2>
          </div>
          <div class="flex gap-2">
            <input
              id="search-issues"
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <div>
              <button onclick="searchIssues()" class="btn btn-primary">
                + New Issue
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <section class="w-[90%] md:w-[80%] mx-auto my-16">
      <div class="bg-[#FFFFFF] p-6 mb-4">
        <button
          id="all-btn"
          onclick="toggleStyle('all-btn')"
          class="btn btn-primary md:px-[49px] md:py-3 font-semibold"
        >
          All
        </button>
        <button id="open-btn"
          onclick="toggleStyle('open-btn')"
          class="btn btn-outline md:px-[38px] md:py-3 font-medium"
        >
          Open
        </button>
        <button id="closed-btn"
          onclick="toggleStyle('closed-btn')"
          class="btn btn-outline md:px-[33px] md:py-3 font-medium"
        >
          Closed
        </button>
      </div>

      <div class="bg-[#FFFFFF] flex md:justify-between p-6 mb-6">
        <div class="flex flex-col md:flex-row gap-2">
          <img
            class="w-8 h-8 md:w-16 md:h-16"
            src="./assets/Aperture.png"
            alt=""
          />
          <div>
            <h3
              id="all-issues"
              class="text-[20px] text-[#1F2937] font-semibold"
            >
              <span id="issues-count">0</span> Issues
            </h3>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex gap-4">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
            <p>Open</p>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
            <p>Closed</p>
          </div>
        </div>
      </div>

      <div id="Issues-container" class="grid grid-cols-1 md:grid-cols-4 gap-3">
        
      </div>
      <div id="loading-spinner" class="h-[60vh] flex hidden justify-center items-center">
          <span class="loading loading-dots loading-xl"></span>
      </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <button class="btn" onclick="my_modal_5.showModal()">open modal</button>
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <h3 class="text-lg font-bold">Hello!</h3>
        <p class="py-4">Press ESC key or click the button below to close</p>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./JS/script.js"></script>
  </body>
</html>
